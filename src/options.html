<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能划词翻译 — 设置</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f5f5;
    color: #333;
    padding: 40px 16px;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    padding: 32px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid #f0f0f0;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: #555;
    margin-bottom: 6px;
  }

  .form-group input[type="text"],
  .form-group input[type="password"],
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
    background: #fff;
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: #4CAF50;
    box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
  }

  .form-group.checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-group.checkbox-group label {
    margin-bottom: 0;
    cursor: pointer;
  }

  .form-group.checkbox-group input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #4CAF50;
  }

  .shortcut-info {
    background: #f8f9fa;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #666;
  }

  .shortcut-info strong {
    color: #333;
  }

  .kbd {
    display: inline-block;
    background: #e9ecef;
    border: 1px solid #ced4da;
    border-radius: 4px;
    padding: 1px 6px;
    font-family: monospace;
    font-size: 12px;
    color: #333;
  }

  .btn-save {
    display: block;
    width: 100%;
    padding: 12px;
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    background: #4CAF50;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-save:hover {
    background: #43A047;
  }

  .btn-save:active {
    background: #388E3C;
  }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    z-index: 10000;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .toast.success {
    background: #4CAF50;
  }

  .toast.error {
    background: #e53935;
  }

  .toast.show {
    opacity: 1;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>智能划词翻译 — 设置</h1>

    <div class="shortcut-info">
      快捷键：<kbd>Alt+T</kbd> 启用/禁用自动翻译，可在浏览器扩展快捷键设置中自定义
    </div>

    <form id="options-form">
      <div class="form-group">
        <label for="apiProvider">API Provider</label>
        <select id="apiProvider" name="apiProvider">
          <option value="deepseek">deepseek</option>
          <option value="volcengine">volcengine</option>
        </select>
      </div>

      <div class="form-group">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" name="apiKey" placeholder="请输入 API Key">
      </div>

      <div class="form-group">
        <label for="model">Model</label>
        <input type="text" id="model" name="model" placeholder="模型名称">
      </div>

      <div class="form-group">
        <label for="baseUrl">Base URL</label>
        <input type="text" id="baseUrl" name="baseUrl" placeholder="https://api.example.com">
      </div>

      <div class="form-group checkbox-group">
        <input type="checkbox" id="enabled" name="enabled">
        <label for="enabled">启用自动翻译</label>
      </div>

      <button type="submit" class="btn-save">保存设置</button>
    </form>

    <hr style="margin: 32px 0; border: none; border-top: 1px solid #f0f0f0;">

    <section class="cache-section">
      <h2 style="font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 16px;">缓存管理</h2>
      <div class="cache-stats" style="background: #f8f9fa; border-radius: 8px; padding: 16px; margin-bottom: 16px; font-size: 14px; color: #555;">
        <p style="margin-bottom: 8px;">预设词库: <strong id="presetCount">--</strong> 个单词 <span id="presetVersion" style="color: #999;">(--)</span></p>
        <p style="margin-bottom: 8px;">用户单词缓存: <strong id="userWordCount">--</strong> 个</p>
        <p>句子缓存: <strong id="sentenceCount">--</strong> 个 <span style="color: #999;">(上限 500，TTL 7 天)</span></p>
      </div>
      <div class="cache-actions" style="display: flex; gap: 12px; margin-bottom: 12px;">
        <button id="exportCacheBtn" class="btn-save" style="background: #2196F3; flex: 1;">导出缓存</button>
        <button id="clearCacheBtn" class="btn-save" style="background: #e53935; flex: 1;">清空用户缓存</button>
      </div>
      <p style="font-size: 12px; color: #999; line-height: 1.5;">导出时合并预设词库、用户单词缓存和句子缓存；清空仅删除 API 请求产生的用户缓存和句子缓存，预设词库不会被删除。</p>
    </section>

    <div class="toast" id="toast"></div>
  </div>

  <script src="db.js"></script>
  <script src="options.js"></script>
</body>
</html>
