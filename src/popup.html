<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 260px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    color: #333;
    background: #fff;
  }
  .container { padding: 16px; }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .title { font-size: 16px; font-weight: 600; }
  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }
  .status-on { background: #e8f5e9; color: #2e7d32; }
  .status-off { background: #f5f5f5; color: #9e9e9e; }
  .divider { height: 1px; background: #f0f0f0; margin: 12px 0; }
  .btn {
    display: block;
    width: 100%;
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    text-align: center;
  }
  .btn-toggle {
    background: #4CAF50;
    color: #fff;
    margin-bottom: 8px;
  }
  .btn-toggle.off { background: #9e9e9e; }
  .btn-settings {
    background: #f5f5f5;
    color: #555;
  }
  .btn-settings:hover { background: #e0e0e0; }
  .btn-toggle:hover { opacity: 0.9; }
  .hint {
    font-size: 12px;
    color: #999;
    text-align: center;
    margin-top: 10px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="title">智能划词翻译</span>
    <span id="statusBadge" class="status-badge"></span>
  </div>
  <div class="divider"></div>
  <button id="toggleBtn" class="btn btn-toggle"></button>
  <button id="settingsBtn" class="btn btn-settings">⚙ 打开设置</button>
  <div class="hint">快捷键 Alt+T 切换翻译</div>
</div>
<script src="popup.js"></script>
</body>
</html>
